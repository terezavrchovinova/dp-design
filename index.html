<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Grafický design a střih videí | Daniela Plamínková</title>
    <meta
      name="description"
      content="Daniela Plamínková nabízí profesionální grafický design a střih videí. Kreativní řešení na míru."
    />
    <meta
      name="keywords"
      content="grafický design, střih videí, video editace, Daniela Plamínková, designér, kreativní služby, motion design"
    />
    <meta name="author" content="Daniela Plamínková" />

    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Figtree:wght@400;700;900&display=swap"
      as="style"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Figtree:wght@400;700;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Figtree:wght@400;700;900&display=swap"
      />
    </noscript>
    <script>
      (function () {
        var timeout = setTimeout(function () {
          document.documentElement.classList.add('fonts-loaded')
        }, 1500)
        if ('fonts' in document) {
          document.fonts.ready.then(function () {
            clearTimeout(timeout)
            document.documentElement.classList.add('fonts-loaded')
          })
          if (document.fonts.check('1em Figtree')) {
            clearTimeout(timeout)
            document.documentElement.classList.add('fonts-loaded')
          }
        } else {
          clearTimeout(timeout)
          document.documentElement.classList.add('fonts-loaded')
        }
      })()
    </script>

    <link
      rel="icon"
      type="image/svg+xml"
      href="src/assets/icons/dp_icon_white.svg"
    />
  </head>
  <body>
    <script>
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual'
      window.scrollTo(0, 0)
    </script>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
